server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React Router client-side routing: any path that isn't a real file
    # falls back to index.html, which then resolves the route in JS.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Same trick as vite.config.ts's dev-server proxy: the browser never
    # talks to the FastAPI backend directly, so there's no CORS to
    # configure and no backend URL baked into the JS bundle. `api` is the
    # backend's service name in docker-compose.
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
